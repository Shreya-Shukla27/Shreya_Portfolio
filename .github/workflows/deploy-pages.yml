name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages-not-enabled:
    if: ${{ github.event.repository.has_pages != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Pages setup required
        run: echo "Enable GitHub Pages in Settings > Pages and set Build and deployment source to GitHub Actions. Then re-run this workflow."

  build:
    if: ${{ github.event.repository.has_pages == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          # Optional: set PAGES_PAT to auto-enable Pages on first run.
          enablement: ${{ secrets.PAGES_PAT != '' }}
          token: ${{ secrets.PAGES_PAT != '' && secrets.PAGES_PAT || github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FORMSPREE_ENDPOINT: ${{ secrets.VITE_FORMSPREE_ENDPOINT }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: ${{ github.event.repository.has_pages == true }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
